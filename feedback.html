<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Science Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Feedback</h1>
    <p>Give your valuable feedback</p>

    <form onsubmit="sendFeedback(event)">
        <input type="text" id="name" placeholder="Your Name" required><br><br>
        <textarea id="feedback" placeholder="Your Feedback" required></textarea><br><br>
        <button type="submit">Submit Feedback</button>
    </form>

    <h3 id="message"></h3>

    <button onclick="location.href='index.html'">Home</button>
</div>

<script>
function sendFeedback(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let fb = document.getElementById("feedback").value;

    let message = `Feedback from ${name}: ${fb}`;

    // WhatsApp open link (replace number with yours)
    window.open(`https://wa.me/9261190322?text=${encodeURIComponent(message)}`, "_blank");

    document.getElementById("message").innerText = "WhatsApp opened! Send message manually.";
    document.getElementById("name").value = "";
    document.getElementById("feedback").value = "";
}
</script>

</body>
</html>
