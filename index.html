<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holi Poem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Happy Holi Sir 🌸</h1>
    <p id="poem">
      रंगों का त्योहार आया,<br>
      खुशियों की बहार लाया।<br>
      प्रभात सर के चेहरे पर,<br>
      मुस्कान का गुलाल छाया।<br><br>

      शिक्षा का दीप जलाते हैं,<br>
      ज्ञान के फूल खिलाते हैं।<br>
      हम सब मिलकर होली में,<br>
      प्रेम के रंग सजाते हैं।<br><br>

      Happy Holi Sir!
    </p>

    <button id="startBtn">Show Message</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
