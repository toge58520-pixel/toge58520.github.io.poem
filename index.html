<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poem Player</title>
<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        text-align:center;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
        animation: bgmove 8s infinite alternate;
    }

    @keyframes bgmove{
        0% {background-position: left;}
        100% {background-position: right;}
    }

    .container{
        margin: 30px auto;
        max-width: 700px;
        background: rgba(255,255,255,0.95);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h2{
        color: #d63384;
        font-size: 32px;
    }

    #poem{
        font-size: 26px;
        line-height: 1.6;
    }

    button{
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        background: #28a745;
        color: white;
        border-radius: 25px;
        cursor: pointer;
        margin-top: 15px;
    }

    button:hover{
        background: #218838;
    }
</style>
</head>
<body>

<div class="container">
    <h2>🌸 Poem for Sir 🌸</h2>

    <p id="poem">
        Prabhat Sir ki roshni jaise,<br>
        har andhera mit jata hai.<br>
        Aapke shabdon se gyaan,<br>
        dil ko raah dikhata hai.<br>
        Shiksha ka diya jalate ho,<br>
        sabko jeena sikhate ho.<br>
        Dhanyawaad Sir,<br>
        aap sach me mahaan ho.
    </p>

    <button id="listenBtn" onclick="toggleSpeak()">Listen Poem</button>
</div>

<script>
let speaking = false;
let speech = null;

function toggleSpeak() {
    let btn = document.getElementById("listenBtn");

    if (speaking) {
        window.speechSynthesis.cancel();
        speaking = false;
        btn.innerHTML = "Listen Poem";
        return;
    }

    speakPoem();
}

function speakPoem() {
    let text = document.getElementById("poem").innerText;
    speech = new SpeechSynthesisUtterance(text);
    speech.lang = "hi-IN";
    speech.rate = 0.8;
    speech.pitch = 1;

    speech.onend = function() {
        speaking = false;
        document.getElementById("listenBtn").innerHTML = "Listen Poem";
    };

    document.getElementById("listenBtn").innerHTML = "Stop Listening";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
